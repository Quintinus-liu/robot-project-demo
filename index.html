<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>机器人视频素材展示</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-copy">
        <p class="eyebrow">Robot Media Showcase</p>
        <h1>机器人视频素材展示</h1>
        <p class="intro">汇总乐聚机器人、湘江智伴、宇树 G1 三组视频材料，以项目为单位呈现机器人能力、演示场景与活动记录。</p>
      </div>
      <div class="hero-player" aria-label="精选视频">
        <video src="乐聚机器人视频素材/长视频.mp4" controls muted playsinline preload="metadata"></video>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="筛选视频">
        <div class="tabs" role="tablist" aria-label="视频分类">
          <button class="tab is-active" type="button" data-filter="all">全部</button>
          <button class="tab" type="button" data-filter="leju">乐聚机器人</button>
          <button class="tab" type="button" data-filter="xiangjiang">湘江智伴</button>
          <button class="tab" type="button" data-filter="unitree">宇树 G1</button>
        </div>
        <label class="search">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="输入关键词">
        </label>
      </section>

      <section class="stats" aria-label="素材统计">
        <article>
          <strong>3</strong>
          <span>项目分类</span>
        </article>
        <article>
          <strong id="videoCount">0</strong>
          <span>展示视频</span>
        </article>
        <article>
          <strong>GitHub Pages</strong>
          <span>静态网页</span>
        </article>
      </section>

      <section id="gallery" class="project-gallery" aria-live="polite"></section>

      <section class="activity-section" aria-label="活动剪影">
        <div class="section-heading">
          <p class="eyebrow">Event Moments</p>
          <h2>活动剪影</h2>
          <p>记录项目展示、调试交流与现场互动中的片段。</p>
        </div>
        <div class="activity-grid">
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225747_181_24.jpg" alt="活动现场剪影一">
            <figcaption>现场展示</figcaption>
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225609_179_24.jpg" alt="活动现场剪影二">
            <figcaption>调试交流</figcaption>
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414224902_178_24.jpg" alt="活动现场剪影三">
            <figcaption>项目讲解</figcaption>
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225926_182_24.png" alt="活动现场剪影四">
            <figcaption>团队记录</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <dialog id="videoDialog" class="video-dialog">
      <div class="dialog-shell">
        <button class="close-button" type="button" aria-label="关闭">×</button>
        <video id="dialogVideo" controls playsinline preload="metadata"></video>
        <div class="dialog-info">
          <p id="dialogGroup"></p>
          <h2 id="dialogTitle"></h2>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
