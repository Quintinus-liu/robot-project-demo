<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>机器人视频素材展示</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section id="gallery" class="project-gallery" aria-live="polite"></section>

      <section class="activity-section" aria-label="活动剪影">
        <div class="section-heading">
          <p class="eyebrow">Event Moments</p>
          <h2>活动剪影</h2>
          <p>记录项目展示、调试交流与现场互动中的片段。</p>
        </div>
        <div class="activity-grid">
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225747_181_24.jpg" alt="活动现场剪影一">
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225609_179_24.jpg" alt="活动现场剪影二">
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414224902_178_24.jpg" alt="活动现场剪影三">
          </figure>
          <figure>
            <img src="湘江智伴视频材料/微信图片_20260414225926_182_24.png" alt="活动现场剪影四">
          </figure>
        </div>
      </section>
    </main>

    <dialog id="videoDialog" class="video-dialog">
      <div class="dialog-shell">
        <button class="close-button" type="button" aria-label="关闭">×</button>
        <video id="dialogVideo" controls playsinline preload="metadata"></video>
        <div class="dialog-info">
          <p id="dialogGroup"></p>
          <h2 id="dialogTitle"></h2>
        </div>
      </div>
    </dialog>

    <dialog id="imageDialog" class="image-dialog">
      <div class="image-dialog-shell">
        <button class="image-close-button" type="button" aria-label="关闭">×</button>
        <img id="dialogImage" alt="">
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
